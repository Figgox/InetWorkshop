<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inet Workbench</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

<div class="wrap">
  <header class="top">
    <div class="brand">
      <h1>Inet Workbench</h1>
      <p>För efterarbeten, både att hålla koll på samt markera status.</p>
    </div>
    <div class="top-actions">
      <span id="save-status"></span>
      <select id="theme-select" title="Theme">
        <option value="light">Ljus</option>
        <option value="night-shift">Mörk</option>
        <option value="terminal">Terminal</option>
      </select>
      <button id="export-btn">Exportera</button>
      <button id="import-btn">Importera</button>
      <input type="file" id="import-file" accept="application/json" style="display:none;">
    </div>
  </header>

  <div class="board">
    <section class="col-short">
      <div class="column-head">
        <div class="column-title">
          <span class="dot urgent"></span>
          <h2>Idag<span class="sub">Lös samma dag.</span></h2>
        </div>
        <span class="count-badge" id="count-short">0 Öppna</span>
      </div>
      <button class="add-btn" id="add-short">+ Ny</button>
      <div class="cards" id="cards-short"></div>
    </section>

    <section class="col-long">
      <div class="column-head">
        <div class="column-title">
          <span class="dot project"></span>
          <h2>Projects<span class="sub">Långtidsarbeten / Saker att hålla kol på.</span></h2>
        </div>
        <span class="count-badge" id="count-long">0 Öppna</span>
      </div>
      <button class="add-btn" id="add-long">+ Ny</button>
      <div class="cards" id="cards-long"></div>
    </section>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
