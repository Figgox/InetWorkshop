<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inet Workbench</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

<!-- Login gate: shown until a name + PIN is entered, see auth.js -->
<div class="login-screen" id="login-screen">
  <form class="login-box" id="login-form">
    <h1>Inet Workbench</h1>
    <p class="login-sub">Logga in med ditt namn och din PIN-kod.</p>
    <label class="login-field">
      Namn
      <input type="text" id="login-name" autocomplete="username" required>
    </label>
    <label class="login-field">
      PIN-kod
      <input type="password" id="login-pin" inputmode="numeric" autocomplete="current-password" required>
    </label>
    <button type="submit">Logga in</button>
    <p class="login-error" id="login-error"></p>
    <p class="login-hint">Nytt namn loggar in direkt och sätter din PIN-kod automatiskt.</p>
  </form>
</div>

<div class="wrap hidden" id="app-wrap">
  <!-- Top bar: title, autosave status, theme picker, export/import backup -->
  <header class="top">
    <div class="brand">
      <h1>Inet Workbench</h1>
      <p>För efterarbeten, både att hålla koll på samt markera status.</p>
    </div>
    <div class="top-actions">
      <span id="save-status"></span>
      <select id="theme-select" title="Theme">
        <option value="light">Ljus</option>
        <option value="night-shift">Mörk</option>
        <option value="terminal">Terminal</option>
      </select>
      <button id="export-btn">Exportera</button>
      <button id="import-btn">Importera</button>
      <input type="file" id="import-file" accept="application/json" style="display:none;">
      <span id="logged-in-as" class="logged-in-as"></span>
      <button id="logout-btn">Logga ut</button>
    </div>
  </header>

  <!-- Board: two side-by-side columns. The ticket cards themselves are empty
       here — script.js fills #cards-short / #cards-long from saved data. -->
       
  <div class="board">
    <!-- "Idag" column: same-day tickets -->
    <section class="col-short">
      <div class="column-head">
        <div class="column-title">
          <span class="dot urgent"></span>
          <h2>Idag<span class="sub">Lös samma dag.</span></h2>
        </div>
        <span class="count-badge" id="count-short">0 Öppna</span>
      </div>
      <button class="add-btn" id="add-short">+ Ny</button>
      <div class="cards" id="cards-short"></div>
    </section>

    <!-- "Projects" column: longer-running work -->
    <section class="col-long">
      <div class="column-head">
        <div class="column-title">
          <span class="dot project"></span>
          <h2>Projekt<span class="sub">Långtidsarbeten / Saker att hålla koll på.</span></h2>
        </div>
        <span class="count-badge" id="count-long">0 Öppna</span>
      </div>
      <button class="add-btn" id="add-long">+ Ny</button>
      <div class="cards" id="cards-long"></div>
    </section>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
</body>
</html>
